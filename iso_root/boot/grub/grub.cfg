set timeout=3
set default=0

set gfxmode=text
set gfxpayload=text
terminal_output console

menuentry "izacos" {
    linux /boot/bzImage rdinit=/bin/busybox init quiet
    initrd /boot/initramfs.cpio.gz
}

menuentry "izacos (debug)" {
    linux /boot/bzImage console=ttyS0 console=tty0 rdinit=/sbin/init loglevel=7 nomodeset
    initrd /boot/initramfs.cpio.gz
}

menuentry "izacos (safe graphics)" {
    linux /boot/bzImage console=tty0 nomodeset loglevel=7 rdinit=/sbin/init
    initrd /boot/initramfs.cpio.gz
}